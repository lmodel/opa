# AUTOGENERATED by linkml/scripts/gen_linkml.py from upstream OPA sources.
# Do not edit by hand; rerun `just gen-linkml`.
id: https://w3id.org/lmodel/opa/capabilities
name: capabilities
title: Capabilities
description: 'Structural model of OPA''s capabilities.json: built-in catalog, Wasm
  ABI support matrix, future keywords, and feature flags.'
license: Apache-2.0
version: 0.1.0

prefixes:
  openpolicyagent: https://w3id.org/lmodel/opa/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  d3fend: https://w3id.org/lmodel/d3fend/
  oscal: https://w3id.org/lmodel/oscal/
default_prefix: openpolicyagent
default_range: string

imports:
  - linkml:types
  - ./common

subsets:
  capabilities_core_elements:
    description: Primary document/root entities for this module.
  capabilities_supporting_elements:
    description: Supporting structural or helper entities.

source: https://github.com/open-policy-agent/opa/blob/main/capabilities.json

see_also:
  - https://www.openpolicyagent.org/docs/policy-reference/

classes:
  Capabilities:
    description: Top-level capabilities document published by an OPA build.
      Lists every built-in function the runtime supports along with Wasm ABI
      compatibility, future keywords and feature flags.
    tree_root: true
    attributes:
      builtins:
        description: All built-in functions supported by this OPA build.
        range: Builtin
        multivalued: true
        inlined: true
        inlined_as_list: true
      future_keywords:
        description: Keywords reserved for future Rego releases.
        range: FutureKeyword
        multivalued: true
      wasm_abi_versions:
        description: Wasm ABI versions the runtime can host.
        range: WasmABIVersion
        multivalued: true
        inlined: true
        inlined_as_list: true
      features:
        description: Optional language / runtime features enabled in this
          build.
        range: FeatureName
        multivalued: true
      allow_net:
        description: Network destinations the built-ins are allowed to
          contact. Absent or empty means unrestricted; an empty list means no
          network access.
        range: string
        multivalued: true
    in_subset:
      - capabilities_core_elements
    related_mappings:
      - d3fend:LocalAuthorizationService
    close_mappings:
      - oscal:Capability
  Builtin:
    description: A Rego built-in function exposed by the OPA runtime.
    attributes:
      name:
        description: Built-in identifier (dotted path, e.g. ``array.concat``).
        identifier: true
        range: string
        required: true
        exact_mappings:
          - schema:identifier
          - dcterms:identifier
      decl:
        description: 'Type declaration: signature plus return type.'
        range: BuiltinDecl
        required: true
        inlined: true
      infix:
        description: Optional infix operator symbol (e.g. ``&``, ``==``).
        range: string
      deprecated:
        description: True when the built-in is scheduled for removal.
        range: boolean
      nondeterministic:
        description: True when invocations may produce different results
          across runs.
        range: boolean
      relation:
        description: True when the built-in is a relation (binds output
          variables).
        range: boolean
    in_subset:
      - capabilities_supporting_elements
    related_mappings:
      - d3fend:AccessPolicyAdministration
      - oscal:Control
  BuiltinDecl:
    description: 'Type declaration of a built-in: function signature and return
      type.'
    attributes:
      type:
        description: Always the literal string ``function``.
        range: string
        required: true
        equals_string: function
      args:
        description: Positional argument types in declaration order.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      result:
        description: Type of the result returned by the built-in.
        range: TypeDecl
        inlined: true
      variadic:
        description: When present, indicates the built-in accepts any number
          of trailing arguments of this type.
        range: TypeDecl
        inlined: true
    in_subset:
      - capabilities_supporting_elements
    related_mappings:
      - d3fend:AccessPolicyAdministration
  TypeDecl:
    description: |
      Recursive type expression used throughout Capabilities declarations.

      All slots are optional because TypeDecl doubles as the structural envelope
      for the various heterogeneous shapes the source JSON uses:
      * ``string|number|boolean|null|function`` -- atomic; only ``type`` is set.
      * ``any`` -- ``of`` is a list of alternative TypeDecls.
      * ``set`` -- ``of`` holds the (single) element TypeDecl.
      * ``array`` -- ``dynamic`` is the homogeneous element TypeDecl, or
        ``static`` is an ordered list describing a fixed-length tuple.
      * ``object`` -- ``static`` lists named property pairs (TypeDecls with
        ``key`` and ``value`` populated); ``dynamic`` is a TypeDecl whose
        ``key``/``value`` describe additional property typing.
      * Inside an ``object``'s ``dynamic`` value, the TypeDecl has only
        ``key`` and ``value`` populated -- ``type`` is absent.
    attributes:
      type:
        description: 'Discriminator: the kind of value this TypeDecl describes.'
        range: BuiltinTypeKind
      of:
        description: Element type(s). For ``set`` it is the (single) element
          type; for ``any`` it is a union of alternative types. Always
          represented as a list -- the instance generator wraps source scalar
          values for shape uniformity.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      dynamic:
        description: For ``array`` types this is the element TypeDecl; for
          ``object`` types it is a TypeDecl with ``key`` and ``value``
          populated.
        range: TypeDecl
        inlined: true
      static:
        description: Either named property pairs of an ``object`` TypeDecl
          (each entry has ``key`` and ``value`` populated) or positional tuple
          element TypeDecls of a fixed-length ``array`` TypeDecl. Same
          recursive TypeDecl shape.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      key:
        description: 'Key of an object''s dynamic-property mapping or static-property
          entry. When the parent TypeDecl is an object''s ``dynamic`` slot, this
          is itself a TypeDecl (e.g. ``{type: string}``); when the parent is an
          object''s ``static`` entry, it is a string literal naming the property.'
        range: Any
        inlined: true
      value:
        description: Value type of an object's dynamic property mapping or
          static property entry. Always a TypeDecl.
        range: TypeDecl
        inlined: true
    in_subset:
      - capabilities_supporting_elements
  WasmABIVersion:
    description: A supported Wasm ABI version pair.
    attributes:
      version:
        description: Major ABI version.
        range: integer
        required: true
      minor_version:
        description: Minor ABI version.
        range: integer
        required: true
    in_subset:
      - capabilities_supporting_elements

enums:
  BuiltinTypeKind:
    description: Kinds of value that a TypeDecl can describe.
    permissible_values:
      string: {}
      number: {}
      boolean: {}
      'null': {}
      any: {}
      array: {}
      set: {}
      object: {}
      function: {}
  FeatureName:
    description: Optional features advertised by the OPA build. The
      permissible values below are seeded from the upstream capabilities.json
      snapshot at generation time; future releases may introduce new flags.
    permissible_values:
      keywords_in_refs:
        meaning: openpolicyagent:feature/keywords_in_refs
      rego_v1:
        meaning: openpolicyagent:feature/rego_v1
      template_strings:
        meaning: openpolicyagent:feature/template_strings
  FutureKeyword:
    description: Identifiers reserved for upcoming Rego releases.
    permissible_values:
      not:
        meaning: openpolicyagent:future_keyword/not
