revision: custom-bundle-signing-demo
roots:
  - policy
rego_version: 1
file_rego_versions:
  - path: policy/awesome.rego
    version: 1
metadata:
  signatures:
    - some_signature;policy/awesome.rego;policy/bundle.tar.gz
  source:
    contrib: custom_bundle_signing/.signatures.json.expected
wasm:
  - entrypoint: policy/allow
    module: /policy.wasm
    annotations:
      - body_part: script
        bindings:
          - name: REGO_WASM
            type: wasm_module
            part: wasmpolicy
