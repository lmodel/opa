id: https://w3id.org/lmodel/opa/builtin_metadata
name: builtin_metadata
title: Builtin Metadata
description: 'Human-friendly catalog of Rego built-ins: documentation strings, argument
  names, version availability and category grouping. Source: ``builtin_metadata.json``.'
license: Apache-2.0
version: 0.1.0

prefixes:
  openpolicyagent: https://w3id.org/lmodel/opa/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  iso27001: https://w3id.org/lmodel/iso27001/
  oscal: https://w3id.org/lmodel/oscal/
default_prefix: openpolicyagent
default_range: string

imports:
  - linkml:types

subsets:
  builtin_metadata_core_elements:
    description: Primary document/root entities for this module.
  builtin_metadata_supporting_elements:
    description: Supporting structural or helper entities.

source:
  https://github.com/open-policy-agent/opa/blob/main/builtin_metadata.json

classes:
  BuiltinMetadataCatalog:
    description: Wrapper class for the contents of ``builtin_metadata.json``.
      The source document is a flat map keyed by built-in name plus a
      ``_categories`` map; the generator script reshapes it so ``categories``
      and ``builtins`` are explicit, inlined-as-dict slots on this wrapper.
    tree_root: true
    attributes:
      categories:
        description: Category name -> list of built-in names belonging to it.
        range: BuiltinCategoryGroup
        multivalued: true
        inlined: true
        inlined_as_list: false
      builtins:
        description: All documented built-ins keyed by name.
        range: BuiltinMetadata
        multivalued: true
        inlined: true
        inlined_as_list: false
    in_subset:
      - builtin_metadata_core_elements
    related_mappings:
      - iso27001:ControlCategory
    broad_mappings:
      - oscal:Catalog
  BuiltinCategoryGroup:
    description: Membership of built-ins in a documentation category.
    attributes:
      name:
        description: Category identifier. Plain string (not the
          BuiltinCategory enum) so gen-python's identifier-slot machinery does
          not forward-reference the enum class.
        identifier: true
        range: string
        required: true
        exact_mappings:
          - schema:identifier
          - dcterms:identifier
      category:
        description: Same value as ``name``, typed against the BuiltinCategory
          enum for downstream consumers.
        range: BuiltinCategory
      builtins:
        description: Names of the built-ins belonging to this category.
        range: string
        multivalued: true
        required: true
    in_subset:
      - builtin_metadata_supporting_elements
    related_mappings:
      - oscal:Group
  BuiltinMetadata:
    description: Human-readable metadata for a single Rego built-in function.
    attributes:
      name:
        description: Built-in identifier (dotted path).
        identifier: true
        range: string
        required: true
        exact_mappings:
          - schema:identifier
          - dcterms:identifier
      description:
        description: Markdown description of the built-in.
        range: string
        slot_uri: schema:description
      introduced:
        description: Earliest OPA release tag in which the built-in was
          available.
        range: string
      available:
        description: Every OPA release tag in which the built-in is available.
        range: string
        multivalued: true
      wasm:
        description: True if the built-in is implemented for the Wasm target.
        range: boolean
      infix:
        description: Optional infix operator symbol.
        range: string
      deprecated:
        description: True when the built-in is scheduled for removal.
        range: boolean
      relation:
        description: True when the built-in is a relation.
        range: boolean
      args:
        description: Positional argument descriptors in declaration order.
        range: BuiltinArg
        multivalued: true
        inlined: true
        inlined_as_list: true
      result:
        description: Descriptor for the value returned by the built-in.
        range: BuiltinResult
        inlined: true
    in_subset:
      - builtin_metadata_supporting_elements
  BuiltinArg:
    description: Documentation for one positional argument of a built-in.
    attributes:
      name:
        description: Argument identifier as documented (often single-letter).
        range: string
        slot_uri: rdfs:label
      description:
        description: Markdown description of the argument.
        range: string
        slot_uri: schema:description
      type:
        description: Compact textual form of the argument type (e.g.
          ``number``, ``set[any]``, ``any<string, number>``).
        range: string
    in_subset:
      - builtin_metadata_supporting_elements
  BuiltinResult:
    description: Documentation for the value returned by a built-in.
    attributes:
      name:
        description: Result identifier as documented.
        range: string
        slot_uri: rdfs:label
      description:
        description: Markdown description of the result.
        range: string
        slot_uri: schema:description
      type:
        description: Compact textual form of the result type.
        range: string
    in_subset:
      - builtin_metadata_supporting_elements

