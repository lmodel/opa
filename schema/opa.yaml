  AssignVarOnceStmt:
    name: AssignVarOnceStmt
    definition_uri: https://w3id.org/lmodel/opa/AssignVarOnceStmt
    description: '``AssignVarOnceStmt`` definition from upstream JSON Schema.'
    in_subset:
