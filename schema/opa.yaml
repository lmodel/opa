slots:
  capabilities__builtins:
    name: capabilities__builtins
    description: All built-in functions supported by this OPA build.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:builtins
    alias: builtins
    owner: Capabilities
    domain_of:
    - Capabilities
    range: Builtin
    multivalued: true
    inlined: true
    inlined_as_list: true
  capabilities__future_keywords:
    name: capabilities__future_keywords
    description: Keywords reserved for future Rego releases.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:future_keywords
    alias: future_keywords
    owner: Capabilities
    domain_of:
    - Capabilities
    range: FutureKeyword
    multivalued: true
  capabilities__wasm_abi_versions:
    name: capabilities__wasm_abi_versions
    description: Wasm ABI versions the runtime can host.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:wasm_abi_versions
    alias: wasm_abi_versions
    owner: Capabilities
    domain_of:
    - Capabilities
    range: WasmABIVersion
    multivalued: true
    inlined: true
    inlined_as_list: true
  capabilities__features:
    name: capabilities__features
    description: Optional language / runtime features enabled in this build.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:features
    alias: features
    owner: Capabilities
    domain_of:
    - Capabilities
    range: FeatureName
    multivalued: true
  capabilities__allow_net:
    name: capabilities__allow_net
    description: Network destinations the built-ins are allowed to contact. Absent
      or empty means unrestricted; an empty list means no network access.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:allow_net
    alias: allow_net
    owner: Capabilities
    domain_of:
    - Capabilities
    range: string
    multivalued: true
  builtin__name:
    name: builtin__name
    description: Built-in identifier (dotted path, e.g. ``array.concat``).
    from_schema: https://w3id.org/lmodel/opa/capabilities
    exact_mappings:
    - schema:identifier
    - dcterms:identifier
    slot_uri: openpolicyagent:name
    identifier: true
    alias: name
    owner: Builtin
    domain_of:
    - Builtin
    range: string
    required: true
  builtin__decl:
    name: builtin__decl
    description: 'Type declaration: signature plus return type.'
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:decl
    alias: decl
    owner: Builtin
    domain_of:
    - Builtin
    range: BuiltinDecl
    required: true
    inlined: true
    inlined_as_list: true
  builtin__infix:
    name: builtin__infix
    description: Optional infix operator symbol (e.g. ``&``, ``==``).
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slot_uri: openpolicyagent:infix
    alias: infix
    owner: Builtin
    domain_of:
    - Builtin
    range: string
  builtin__deprecated:
    name: builtin__deprecated
    description: True when the built-in is scheduled for removal.
    from_schema: https://w3id.org/lmodel/opa/capabilities
