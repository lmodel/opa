        required: true
      row:
        name: row
        description: '``row`` field of ``ArrayAppendStmt`` (from upstream JSON Schema).'
        range: integer
        required: true
      array:
        name: array
        description: '``array`` field of ``ArrayAppendStmt`` (from upstream JSON Schema).'
        range: integer
        required: true
      value:
        name: value
        description: '``value`` field of ``ArrayAppendStmt`` (from upstream JSON Schema).'
