        - range: ArrayAppendStmt
        - range: AssignIntStmt
        - range: AssignVarOnceStmt
        - range: AssignVarStmt
        - range: BlockStmt
        - range: BreakStmt
        - range: CallDynamicStmt
        - range: CallStmt
        - range: DotStmt
        - range: EqualStmt
        - range: IsArrayStmt
        - range: IsDefinedStmt
