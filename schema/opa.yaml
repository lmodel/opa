name: opa
description: Umbrella LinkML schema for Open Policy Agent (OPA) and the Rego policy
  language. Imports per-source submodules generated from upstream OPA artifacts (capabilities,
  built-in metadata, version index, sample authorization input, bundle manifest, and
  IR plan).
title: Open Policy Agent (OPA)
source: https://github.com/open-policy-agent/opa/blob/main
see_also:
- https://www.openpolicyagent.org/
- https://lmodel.github.io/opa
id: https://w3id.org/lmodel/opa
version: 0.1.0
imports:
- linkml:types
- ./common
- ./capabilities
- ./builtin_metadata
- ./version_index
- ./authorization_input
- ./bundle_manifest
- ./ir_plan
license: Apache-2.0
prefixes:
  openpolicyagent:
    prefix_prefix: openpolicyagent
    prefix_reference: https://w3id.org/lmodel/opa/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
default_prefix: openpolicyagent
default_range: string
subsets:
  opa_core_elements:
    name: opa_core_elements
    definition_uri: https://w3id.org/lmodel/opa/OpaCoreElements
    description: Primary document/root entities across OPA modules.
    from_schema: https://w3id.org/lmodel/opa
  opa_supporting_elements:
    name: opa_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/OpaSupportingElements
    description: Supporting structural or helper entities across modules.
    from_schema: https://w3id.org/lmodel/opa
  common_core_elements:
    name: common_core_elements
    definition_uri: https://w3id.org/lmodel/opa/CommonCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/common
  common_supporting_elements:
    name: common_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/CommonSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/common
  capabilities_core_elements:
    name: capabilities_core_elements
    definition_uri: https://w3id.org/lmodel/opa/CapabilitiesCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/capabilities
  capabilities_supporting_elements:
    name: capabilities_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/CapabilitiesSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/capabilities
  builtin_metadata_core_elements:
    name: builtin_metadata_core_elements
    definition_uri: https://w3id.org/lmodel/opa/BuiltinMetadataCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
  builtin_metadata_supporting_elements:
    name: builtin_metadata_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/BuiltinMetadataSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
  version_index_core_elements:
    name: version_index_core_elements
    definition_uri: https://w3id.org/lmodel/opa/VersionIndexCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/version_index
  version_index_supporting_elements:
    name: version_index_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/VersionIndexSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/version_index
  authorization_input_core_elements:
    name: authorization_input_core_elements
    definition_uri: https://w3id.org/lmodel/opa/AuthorizationInputCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/authorization_input
  authorization_input_supporting_elements:
    name: authorization_input_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/AuthorizationInputSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/authorization_input
  bundle_manifest_core_elements:
    name: bundle_manifest_core_elements
    definition_uri: https://w3id.org/lmodel/opa/BundleManifestCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/bundle_manifest
  bundle_manifest_supporting_elements:
    name: bundle_manifest_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/BundleManifestSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/bundle_manifest
  ir_plan_core_elements:
    name: ir_plan_core_elements
    definition_uri: https://w3id.org/lmodel/opa/IrPlanCoreElements
    description: Primary document/root entities for this module.
    from_schema: https://w3id.org/lmodel/opa/ir_plan
  ir_plan_supporting_elements:
    name: ir_plan_supporting_elements
    definition_uri: https://w3id.org/lmodel/opa/IrPlanSupportingElements
    description: Supporting structural or helper entities.
    from_schema: https://w3id.org/lmodel/opa/ir_plan
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  BuiltinTypeKind:
    name: BuiltinTypeKind
    definition_uri: https://w3id.org/lmodel/opa/BuiltinTypeKind
    description: Kinds of value that a TypeDecl can describe.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    permissible_values:
      string:
        text: string
      number:
        text: number
      boolean:
        text: boolean
      'null':
        text: 'null'
      any:
        text: any
      array:
        text: array
      set:
        text: set
      object:
        text: object
      function:
        text: function
  FeatureName:
    name: FeatureName
    definition_uri: https://w3id.org/lmodel/opa/FeatureName
    description: Optional features advertised by the OPA build. The permissible values
      below are seeded from the upstream capabilities.json snapshot at generation
      time; future releases may introduce new flags.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    permissible_values:
      keywords_in_refs:
        text: keywords_in_refs
        meaning: openpolicyagent:feature/keywords_in_refs
      rego_v1:
        text: rego_v1
        meaning: openpolicyagent:feature/rego_v1
      template_strings:
        text: template_strings
        meaning: openpolicyagent:feature/template_strings
  FutureKeyword:
    name: FutureKeyword
    definition_uri: https://w3id.org/lmodel/opa/FutureKeyword
    description: Identifiers reserved for upcoming Rego releases.
    from_schema: https://w3id.org/lmodel/opa/capabilities
    permissible_values:
      not:
