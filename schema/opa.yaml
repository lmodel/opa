    - dpv:EnforceAccessControl
    - oscal:ImplementedControlStatement
    - oscal:ImplementedRequirement
    slots:
    - wasmResolver__annotations
    - wasmResolver__entrypoint
    - wasmResolver__module
    attributes:
      annotations:
        name: annotations
        description: '``annotations`` field of ``WasmResolver`` (from upstream JSON
          Schema).'
        range: Any
        multivalued: true
      entrypoint:
        name: entrypoint
        description: '``entrypoint`` field of ``WasmResolver`` (from upstream JSON
          Schema).'
        range: string
      module:
        name: module
        description: '``module`` field of ``WasmResolver`` (from upstream JSON Schema).'
        range: string
    class_uri: openpolicyagent:WasmResolver
  FileRegoVersion:
    name: FileRegoVersion
    definition_uri: https://w3id.org/lmodel/opa/FileRegoVersion
    description: Typed override record for ``Manifest.file_rego_versions``. Provides
      stronger validation than a free-form map while keeping the same semantics.
    in_subset:
    - bundle_manifest_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/bundle_manifest
    slots:
    - fileRegoVersion__path
    - fileRegoVersion__version
    attributes:
      path:
        name: path
        description: Bundle-relative file path receiving a Rego version override.
        identifier: true
        range: string
        required: true
      version:
        name: version
        description: 'Rego version for this file: ``0`` (v0) or ``1`` (v1).'
        range: integer
        required: true
        minimum_value: 0
        maximum_value: 1
    class_uri: openpolicyagent:FileRegoVersion
  ArrayAppendStmt:
