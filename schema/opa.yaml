        range: integer
        required: true
      row:
        name: row
        description: '``row`` field of ``AssignVarOnceStmt`` (from upstream JSON Schema).'
        range: integer
        required: true
      source:
        name: source
        description: '``source`` field of ``AssignVarOnceStmt`` (from upstream JSON
          Schema).'
        range: Operand
        required: true
        inlined: true
      target:
        name: target
        description: '``target`` field of ``AssignVarOnceStmt`` (from upstream JSON
