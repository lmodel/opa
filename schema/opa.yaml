classes:
  Any:
    name: Any
    definition_uri: https://w3id.org/lmodel/opa/Any
    description: Free-form value placeholder (scalar, list, or object). Used to model
      source slots whose representation is heterogeneous or intentionally open (e.g.
      ``TypeDecl.key``, ``AuthorizationInput.body``).
    comments:
    - Single shared definition mapped to ``linkml:Any`` (per metamodel) to avoid duplicate-class
      collisions across imported modules.
    - 'Usage is concentrated at real polymorphism boundaries: free-form HTTP payloads,
      bundle metadata/annotations, discriminated-union payloads, and upstream-opaque
      JSON Schema slots.'
    - Usage is localized (roughly 11 sites across ~60 classes); most slots remain
      explicitly typed rather than defaulting to ``Any``.
    in_subset:
    - common_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/common
    mappings:
    - linkml:Any
    class_uri: linkml:Any
  Capabilities:
    name: Capabilities
    definition_uri: https://w3id.org/lmodel/opa/Capabilities
    description: Top-level capabilities document published by an OPA build. Lists
      every built-in function the runtime supports along with Wasm ABI compatibility,
      future keywords and feature flags.
    in_subset:
    - capabilities_core_elements
    from_schema: https://w3id.org/lmodel/opa/capabilities
    close_mappings:
    - oscal:Capability
    related_mappings:
    - d3fend:LocalAuthorizationService
    slots:
    - capabilities__builtins
    - capabilities__future_keywords
    - capabilities__wasm_abi_versions
    - capabilities__features
    - capabilities__allow_net
    attributes:
      builtins:
        name: builtins
        description: All built-in functions supported by this OPA build.
        range: Builtin
        multivalued: true
        inlined: true
        inlined_as_list: true
      future_keywords:
        name: future_keywords
        description: Keywords reserved for future Rego releases.
        range: FutureKeyword
        multivalued: true
      wasm_abi_versions:
        name: wasm_abi_versions
        description: Wasm ABI versions the runtime can host.
        range: WasmABIVersion
        multivalued: true
        inlined: true
        inlined_as_list: true
      features:
        name: features
        description: Optional language / runtime features enabled in this build.
        range: FeatureName
        multivalued: true
      allow_net:
        name: allow_net
        description: Network destinations the built-ins are allowed to contact. Absent
          or empty means unrestricted; an empty list means no network access.
        range: string
        multivalued: true
    class_uri: openpolicyagent:Capabilities
    tree_root: true
  Builtin:
    name: Builtin
    definition_uri: https://w3id.org/lmodel/opa/Builtin
    description: A Rego built-in function exposed by the OPA runtime.
    in_subset:
    - capabilities_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/capabilities
    related_mappings:
    - d3fend:AccessPolicyAdministration
    - oscal:Control
    slots:
    - builtin__name
    - builtin__decl
    - builtin__infix
    - builtin__deprecated
    - builtin__nondeterministic
    - builtin__relation
    attributes:
      name:
        name: name
        description: Built-in identifier (dotted path, e.g. ``array.concat``).
        exact_mappings:
        - schema:identifier
        - dcterms:identifier
        identifier: true
        range: string
        required: true
      decl:
        name: decl
        description: 'Type declaration: signature plus return type.'
        range: BuiltinDecl
        required: true
        inlined: true
      infix:
        name: infix
        description: Optional infix operator symbol (e.g. ``&``, ``==``).
        range: string
      deprecated:
        name: deprecated
        description: True when the built-in is scheduled for removal.
        range: boolean
      nondeterministic:
        name: nondeterministic
        description: True when invocations may produce different results across runs.
        range: boolean
      relation:
        name: relation
        description: True when the built-in is a relation (binds output variables).
        range: boolean
    class_uri: openpolicyagent:Builtin
  BuiltinDecl:
    name: BuiltinDecl
    definition_uri: https://w3id.org/lmodel/opa/BuiltinDecl
    description: 'Type declaration of a built-in: function signature and return type.'
    in_subset:
    - capabilities_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/capabilities
    related_mappings:
    - d3fend:AccessPolicyAdministration
    slots:
    - builtinDecl__type
    - builtinDecl__args
    - builtinDecl__result
    - builtinDecl__variadic
    attributes:
      type:
        name: type
        description: Always the literal string ``function``.
        range: string
        required: true
        equals_string: function
      args:
        name: args
        description: Positional argument types in declaration order.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      result:
        name: result
        description: Type of the result returned by the built-in.
        range: TypeDecl
        inlined: true
      variadic:
        name: variadic
        description: When present, indicates the built-in accepts any number of trailing
          arguments of this type.
        range: TypeDecl
        inlined: true
    class_uri: openpolicyagent:BuiltinDecl
  TypeDecl:
    name: TypeDecl
    definition_uri: https://w3id.org/lmodel/opa/TypeDecl
    description: "Recursive type expression used throughout Capabilities declarations.\n\
      \nAll slots are optional because TypeDecl doubles as the structural envelope\n\
      for the various heterogeneous shapes the source JSON uses:\n* ``string|number|boolean|null|function``\
      \ -- atomic; only ``type`` is set.\n* ``any`` -- ``of`` is a list of alternative\
      \ TypeDecls.\n* ``set`` -- ``of`` holds the (single) element TypeDecl.\n* ``array``\
      \ -- ``dynamic`` is the homogeneous element TypeDecl, or\n  ``static`` is an\
      \ ordered list describing a fixed-length tuple.\n* ``object`` -- ``static``\
      \ lists named property pairs (TypeDecls with\n  ``key`` and ``value`` populated);\
      \ ``dynamic`` is a TypeDecl whose\n  ``key``/``value`` describe additional property\
      \ typing.\n* Inside an ``object``'s ``dynamic`` value, the TypeDecl has only\n\
      \  ``key`` and ``value`` populated -- ``type`` is absent.\n"
    in_subset:
    - capabilities_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slots:
    - typeDecl__type
    - typeDecl__of
    - typeDecl__dynamic
    - typeDecl__static
    - typeDecl__key
    - typeDecl__value
    attributes:
      type:
        name: type
        description: 'Discriminator: the kind of value this TypeDecl describes.'
        range: BuiltinTypeKind
      of:
        name: of
        description: Element type(s). For ``set`` it is the (single) element type;
          for ``any`` it is a union of alternative types. Always represented as a
          list -- the instance generator wraps source scalar values for shape uniformity.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      dynamic:
        name: dynamic
        description: For ``array`` types this is the element TypeDecl; for ``object``
          types it is a TypeDecl with ``key`` and ``value`` populated.
        range: TypeDecl
        inlined: true
      static:
        name: static
        description: Either named property pairs of an ``object`` TypeDecl (each entry
          has ``key`` and ``value`` populated) or positional tuple element TypeDecls
          of a fixed-length ``array`` TypeDecl. Same recursive TypeDecl shape.
        range: TypeDecl
        multivalued: true
        inlined: true
        inlined_as_list: true
      key:
        name: key
        description: 'Key of an object''s dynamic-property mapping or static-property
          entry. When the parent TypeDecl is an object''s ``dynamic`` slot, this is
          itself a TypeDecl (e.g. ``{type: string}``); when the parent is an object''s
          ``static`` entry, it is a string literal naming the property.'
        range: Any
        inlined: true
      value:
        name: value
        description: Value type of an object's dynamic property mapping or static
          property entry. Always a TypeDecl.
        range: TypeDecl
        inlined: true
    class_uri: openpolicyagent:TypeDecl
  WasmABIVersion:
    name: WasmABIVersion
    definition_uri: https://w3id.org/lmodel/opa/WasmABIVersion
    description: A supported Wasm ABI version pair.
    in_subset:
    - capabilities_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/capabilities
    slots:
    - wasmABIVersion__version
    - wasmABIVersion__minor_version
    attributes:
      version:
        name: version
        description: Major ABI version.
        range: integer
        required: true
      minor_version:
        name: minor_version
        description: Minor ABI version.
        range: integer
        required: true
    class_uri: openpolicyagent:WasmABIVersion
  BuiltinMetadataCatalog:
    name: BuiltinMetadataCatalog
    definition_uri: https://w3id.org/lmodel/opa/BuiltinMetadataCatalog
    description: Wrapper class for the contents of ``builtin_metadata.json``. The
      source document is a flat map keyed by built-in name plus a ``_categories``
      map; the generator script reshapes it so ``categories`` and ``builtins`` are
      explicit, inlined-as-dict slots on this wrapper.
    in_subset:
    - builtin_metadata_core_elements
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
    related_mappings:
    - iso27001:ControlCategory
    broad_mappings:
    - oscal:Catalog
    slots:
    - builtinMetadataCatalog__categories
    - builtinMetadataCatalog__builtins
    attributes:
      categories:
        name: categories
        description: Category name -> list of built-in names belonging to it.
        range: BuiltinCategoryGroup
        multivalued: true
        inlined: true
        inlined_as_list: false
      builtins:
        name: builtins
        description: All documented built-ins keyed by name.
        range: BuiltinMetadata
        multivalued: true
        inlined: true
        inlined_as_list: false
    class_uri: openpolicyagent:BuiltinMetadataCatalog
    tree_root: true
  BuiltinCategoryGroup:
    name: BuiltinCategoryGroup
    definition_uri: https://w3id.org/lmodel/opa/BuiltinCategoryGroup
    description: Membership of built-ins in a documentation category.
    in_subset:
    - builtin_metadata_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
    related_mappings:
    - oscal:Group
    slots:
    - builtinCategoryGroup__name
    - builtinCategoryGroup__category
    - builtinCategoryGroup__builtins
    attributes:
      name:
        name: name
        description: Category identifier. Plain string (not the BuiltinCategory enum)
          so gen-python's identifier-slot machinery does not forward-reference the
          enum class.
        exact_mappings:
        - schema:identifier
        - dcterms:identifier
        identifier: true
        range: string
        required: true
      category:
        name: category
        description: Same value as ``name``, typed against the BuiltinCategory enum
          for downstream consumers.
        range: BuiltinCategory
      builtins:
        name: builtins
        description: Names of the built-ins belonging to this category.
        range: string
        required: true
        multivalued: true
    class_uri: openpolicyagent:BuiltinCategoryGroup
  BuiltinMetadata:
    name: BuiltinMetadata
    definition_uri: https://w3id.org/lmodel/opa/BuiltinMetadata
    description: Human-readable metadata for a single Rego built-in function.
    in_subset:
    - builtin_metadata_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
    slots:
    - builtinMetadata__name
    - builtinMetadata__description
    - builtinMetadata__introduced
    - builtinMetadata__available
    - builtinMetadata__wasm
    - builtinMetadata__infix
    - builtinMetadata__deprecated
    - builtinMetadata__relation
    - builtinMetadata__args
    - builtinMetadata__result
    attributes:
      name:
        name: name
        description: Built-in identifier (dotted path).
        exact_mappings:
        - schema:identifier
        - dcterms:identifier
        identifier: true
        range: string
        required: true
      description:
        name: description
        description: Markdown description of the built-in.
        slot_uri: schema:description
        range: string
      introduced:
        name: introduced
        description: Earliest OPA release tag in which the built-in was available.
        range: string
      available:
        name: available
        description: Every OPA release tag in which the built-in is available.
        range: string
        multivalued: true
      wasm:
        name: wasm
        description: True if the built-in is implemented for the Wasm target.
        range: boolean
      infix:
        name: infix
        description: Optional infix operator symbol.
        range: string
      deprecated:
        name: deprecated
        description: True when the built-in is scheduled for removal.
        range: boolean
      relation:
        name: relation
        description: True when the built-in is a relation.
        range: boolean
      args:
        name: args
        description: Positional argument descriptors in declaration order.
        range: BuiltinArg
        multivalued: true
        inlined: true
        inlined_as_list: true
      result:
        name: result
        description: Descriptor for the value returned by the built-in.
        range: BuiltinResult
        inlined: true
    class_uri: openpolicyagent:BuiltinMetadata
  BuiltinArg:
    name: BuiltinArg
    definition_uri: https://w3id.org/lmodel/opa/BuiltinArg
    description: Documentation for one positional argument of a built-in.
    in_subset:
    - builtin_metadata_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
    slots:
    - builtinArg__name
    - builtinArg__description
    - builtinArg__type
    attributes:
      name:
        name: name
        description: Argument identifier as documented (often single-letter).
        slot_uri: rdfs:label
        range: string
      description:
        name: description
        description: Markdown description of the argument.
        slot_uri: schema:description
        range: string
      type:
        name: type
        description: Compact textual form of the argument type (e.g. ``number``, ``set[any]``,
          ``any<string, number>``).
        range: string
    class_uri: openpolicyagent:BuiltinArg
  BuiltinResult:
    name: BuiltinResult
    definition_uri: https://w3id.org/lmodel/opa/BuiltinResult
    description: Documentation for the value returned by a built-in.
    in_subset:
    - builtin_metadata_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/builtin_metadata
    slots:
    - builtinResult__name
    - builtinResult__description
    - builtinResult__type
    attributes:
      name:
        name: name
        description: Result identifier as documented.
        slot_uri: rdfs:label
        range: string
      description:
        name: description
        description: Markdown description of the result.
        slot_uri: schema:description
        range: string
      type:
        name: type
        description: Compact textual form of the result type.
        range: string
    class_uri: openpolicyagent:BuiltinResult
  VersionIndex:
    name: VersionIndex
    definition_uri: https://w3id.org/lmodel/opa/VersionIndex
    description: Mapping from language-element names to the OPA semantic version that
      first introduced them. Grouped into built-ins, future-keywords, and features.
    in_subset:
    - version_index_core_elements
    from_schema: https://w3id.org/lmodel/opa/version_index
    slots:
    - versionIndex__builtins
    - versionIndex__features
    - versionIndex__keywords
    attributes:
      builtins:
        name: builtins
        description: Built-in name -> introduction version.
        range: ElementVersion
        multivalued: true
        inlined: true
        inlined_as_list: false
      features:
        name: features
        description: Feature flag -> introduction version.
        range: ElementVersion
        multivalued: true
        inlined: true
        inlined_as_list: false
      keywords:
        name: keywords
        description: Future keyword -> introduction version.
        range: ElementVersion
        multivalued: true
        inlined: true
        inlined_as_list: false
    class_uri: openpolicyagent:VersionIndex
    tree_root: true
  ElementVersion:
    name: ElementVersion
    definition_uri: https://w3id.org/lmodel/opa/ElementVersion
    description: Semantic version triple identifying when an element was introduced.
    in_subset:
    - version_index_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/version_index
    slots:
    - elementVersion__name
    - elementVersion__major
    - elementVersion__minor
    - elementVersion__patch
    attributes:
      name:
        name: name
        description: Name of the language element (built-in, keyword, or feature).
        exact_mappings:
        - schema:identifier
        - dcterms:identifier
        identifier: true
        range: string
        required: true
      major:
        name: major
        description: Major version number (source field ``Major``).
        range: integer
        required: true
        minimum_value: 0
      minor:
        name: minor
        description: Minor version number (source field ``Minor``).
        range: integer
        required: true
        minimum_value: 0
      patch:
        name: patch
        description: Patch version number (source field ``Patch``).
        range: integer
        required: true
        minimum_value: 0
    class_uri: openpolicyagent:ElementVersion
  AuthorizationInput:
    name: AuthorizationInput
    definition_uri: https://w3id.org/lmodel/opa/AuthorizationInput
    description: Input document the example HTTP API Authorization policy receives.
      Mirrors the OPA-provided JSON Schema at ``v1/schemas/authorizationPolicy.json``.
    in_subset:
    - authorization_input_core_elements
    from_schema: https://w3id.org/lmodel/opa/authorization_input
    close_mappings:
    - d3fend:Authorization
    - dpv:AuthorisationProcedure
    related_mappings:
    - d3fend:AccessControlList
    - d3fend:AuthorizationService
    - dpv:Access
    - iso27001:SecurityControl
    - oscal:AuthorizationBoundary
    slots:
    - authorizationInput__identity
    - authorizationInput__client_certificates
    - authorizationInput__method
    - authorizationInput__path
    - authorizationInput__params
    - authorizationInput__headers
    - authorizationInput__body
    attributes:
      identity:
        name: identity
        description: Caller identity, typically extracted from an authentication token.
        range: string
        required: true
      client_certificates:
        name: client_certificates
        description: Client certificates presented during the TLS handshake. The example
          schema leaves the item shape opaque (free-form objects).
        range: Any
        required: true
        multivalued: true
        inlined: true
      method:
        name: method
        description: HTTP method of the request being authorized (e.g. ``GET``, ``POST``).
        range: string
        required: true
      path:
        name: path
        description: Request URL path split on ``/`` and decoded into a list of path
          segments.
        range: string
        required: true
        multivalued: true
      params:
        name: params
        description: Query-string parameters as a free-form object.
        range: Any
        required: true
        inlined: true
      headers:
        name: headers
        description: Request headers as a free-form object (case insensitive in HTTP).
        range: Any
        required: true
        inlined: true
      body:
        name: body
        description: Decoded request body as a free-form object.
        range: Any
        required: true
        inlined: true
    class_uri: openpolicyagent:AuthorizationInput
    tree_root: true
  Manifest:
    name: Manifest
    definition_uri: https://w3id.org/lmodel/opa/Manifest
    description: '``Manifest`` definition from upstream JSON Schema.'
    in_subset:
    - bundle_manifest_core_elements
    from_schema: https://w3id.org/lmodel/opa/bundle_manifest
    close_mappings:
    - oscal:DefinedComponent
    - slsa:Statement
    related_mappings:
    - slsa:BuildProvenance
    - slsa:DigestSet
    - slsa:VerificationSummaryAttestation
    broad_mappings:
    - d3fend:AccessControlConfiguration
    - dpv:Policy
    - iso27001:DocumentedInformation
    - oscal:ComponentDefinition
    - slsa:ResourceDescriptor
    slots:
    - manifest__file_rego_versions
    - manifest__metadata
    - manifest__rego_version
    - manifest__revision
    - manifest__roots
    - manifest__wasm
    attributes:
      file_rego_versions:
        name: file_rego_versions
        description: Per-file Rego language version overrides. Each record maps a
          bundle file path to ``version`` where ``0`` = Rego v0 and ``1`` = Rego v1.
        range: FileRegoVersion
        multivalued: true
        inlined: true
        inlined_as_list: true
      metadata:
        name: metadata
        description: '``metadata`` field of ``Manifest`` (from upstream JSON Schema).'
        range: Any
        inlined: true
      rego_version:
        name: rego_version
        description: Rego language version pinned for files in this bundle. ``0``
          = Rego v0 (legacy); ``1`` = Rego v1 (default since OPA 1.0). See ``v1/bundle/bundle.go``
          for the canonical mapping.
        range: integer
        minimum_value: 0
        maximum_value: 1
      revision:
        name: revision
        description: '``revision`` field of ``Manifest`` (from upstream JSON Schema).'
        range: string
        required: true
      roots:
        name: roots
        description: '``roots`` field of ``Manifest`` (from upstream JSON Schema).'
        range: string
        multivalued: true
      wasm:
        name: wasm
        description: '``wasm`` field of ``Manifest`` (from upstream JSON Schema).'
        range: WasmResolver
        multivalued: true
        inlined: true
        inlined_as_list: true
    class_uri: openpolicyagent:Manifest
    tree_root: true
  WasmResolver:
    name: WasmResolver
    definition_uri: https://w3id.org/lmodel/opa/WasmResolver
    description: '``WasmResolver`` definition from upstream JSON Schema.'
    in_subset:
    - bundle_manifest_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/bundle_manifest
    close_mappings:
