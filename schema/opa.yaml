  AssignVarStmt:
    name: AssignVarStmt
    definition_uri: https://w3id.org/lmodel/opa/AssignVarStmt
    description: '``AssignVarStmt`` definition from upstream JSON Schema.'
    in_subset:
    - ir_plan_supporting_elements
    from_schema: https://w3id.org/lmodel/opa/ir_plan
    slots:
    - assignVarStmt__col
    - assignVarStmt__file
    - assignVarStmt__row
    - assignVarStmt__source
    - assignVarStmt__target
    attributes:
      col:
        name: col
        description: '``col`` field of ``AssignVarStmt`` (from upstream JSON Schema).'
        range: integer
        required: true
      file:
        name: file
        description: '``file`` field of ``AssignVarStmt`` (from upstream JSON Schema).'
        range: integer
